<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <title>SAP Mobile Admin</title>
  <style>
    :root {
      --bg: #f3f5f8;
      --panel: #ffffff;
      --panel-2: #f8fafc;
      --text: #0f172a;
      --muted: #64748b;
      --line: #e2e8f0;
      --shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
      --blue: #0a6ed1;
      --blue-2: #0854a0;
      --green: #188918;
      --red: #bb0000;
      --orange: #c87b00;
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --radius-sm: 10px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--text); font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; overscroll-behavior: none; }
    body { min-height: 100vh; }
    button, input { font: inherit; }
    button { border: 0; background: none; }
    input { outline: none; }

    .app-shell {
      min-height: 100vh;
      max-width: 520px;
      margin: 0 auto;
      background:
        radial-gradient(circle at top left, rgba(10,110,209,.08), transparent 30%),
        linear-gradient(180deg, #f7f9fc 0%, #eff3f8 100%);
      position: relative;
      overflow: hidden;
      padding-top: calc(var(--safe-top) + 8px);
      padding-bottom: calc(var(--safe-bottom) + 88px);
    }

    .header {
      padding: 14px 18px 8px;
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(18px);
      background: rgba(243,245,248,0.82);
      border-bottom: 1px solid rgba(226,232,240,0.7);
    }

    .brand-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand-left { display: flex; align-items: center; gap: 12px; min-width: 0; }

    .brand-badge {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: linear-gradient(145deg, #0a6ed1, #0854a0);
      color: white;
      display: grid;
      place-items: center;
      box-shadow: 0 8px 22px rgba(10,110,209,.24);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .08em;
    }

    .brand-meta { min-width: 0; }
    .brand-name { font-size: 20px; font-weight: 800; margin: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .sync-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,.92);
      border: 1px solid var(--line);
      box-shadow: 0 4px 14px rgba(15,23,42,.05);
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }

    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--orange); }
    .dot.online { background: var(--green); }
    .dot.offline { background: var(--red); }

    .screen {
      display: none;
      padding: 16px 16px 0;
      animation: fadeIn .22s ease;
    }

    .screen.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .hero-card,
    .panel,
    .kpi-card,
    .login-card {
      background: rgba(255,255,255,0.96);
      border: 1px solid rgba(226,232,240,.85);
      box-shadow: var(--shadow);
      border-radius: var(--radius-xl);
    }

    .hero-card {
      padding: 20px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }

    .hero-card::before {
      content: "";
      position: absolute;
      inset: auto -40px -40px auto;
      width: 160px;
      height: 160px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(10,110,209,.15), transparent 70%);
      pointer-events: none;
    }

    .hero-title { margin: 0; font-size: 28px; line-height: 1.02; font-weight: 800; }
    .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 18px; }

    .btn {
      width: 100%;
      border-radius: 16px;
      padding: 14px 16px;
      font-weight: 700;
      display: inline-flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      transition: transform .16s ease, box-shadow .16s ease, opacity .16s ease;
      min-height: 50px;
    }

    .btn:active { transform: scale(.985); }
    .btn-primary { background: linear-gradient(180deg, var(--blue), var(--blue-2)); color: #fff; box-shadow: 0 10px 22px rgba(10,110,209,.25); }
    .btn-secondary { background: #fff; color: var(--text); border: 1px solid var(--line); }
    .btn[disabled] { opacity: .55; cursor: default; }

    .grid-kpis { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }

    .kpi-card { padding: 16px; border-radius: 22px; }
    .kpi-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 10px; }
    .kpi-label { margin: 0; color: var(--muted); font-size: 12px; font-weight: 700; line-height: 1.35; max-width: calc(100% - 42px); }
    .kpi-icon {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      display: grid;
      place-items: center;
      background: #f8fafc;
      border: 1px solid var(--line);
      color: var(--blue);
      flex-shrink: 0;
    }
    .kpi-icon svg { width: 18px; height: 18px; }
    .kpi-value { margin: 0; font-size: 28px; font-weight: 800; line-height: 1; }

    .panel { padding: 16px; margin-bottom: 16px; }
    .panel-head { display: flex; justify-content: space-between; gap: 10px; align-items: center; margin-bottom: 12px; }
    .panel-title { margin: 0; font-size: 18px; font-weight: 800; }

    .movement-list { display: grid; gap: 10px; }
    .movement-item {
      border: 1px solid var(--line);
      background: var(--panel-2);
      border-radius: 16px;
      padding: 14px;
      display: grid;
      gap: 8px;
    }

    .movement-top { display: flex; justify-content: space-between; gap: 10px; align-items: flex-start; }
    .movement-name { font-size: 15px; font-weight: 800; margin: 0; }
    .movement-id { font-size: 12px; color: var(--muted); margin: 2px 0 0; }
    .movement-type {
      padding: 7px 10px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 800;
      letter-spacing: .05em;
      white-space: nowrap;
    }
    .tag-suma { background: #ecfdf3; color: #166534; }
    .tag-canje { background: #fff7ed; color: #9a3412; }

    .movement-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 14px;
      font-size: 12px;
      color: var(--muted);
    }

    .empty-state {
      padding: 18px;
      text-align: center;
      border: 1px dashed var(--line);
      border-radius: 18px;
      color: var(--muted);
      background: #fafcff;
    }

    .form-grid { display: grid; gap: 14px; }
    .field { display: grid; gap: 8px; }
    .field label { font-size: 13px; font-weight: 700; color: var(--text); }
    .input-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      min-height: 54px;
      padding: 0 14px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.7);
    }

    .input-wrap input {
      width: 100%;
      border: none;
      background: transparent;
      color: var(--text);
      height: 52px;
      font-size: 16px;
    }

    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: calc(var(--safe-bottom) + 14px);
      transform: translateX(-50%);
      width: min(92%, 460px);
      background: rgba(255,255,255,.92);
      border: 1px solid rgba(226,232,240,.9);
      box-shadow: 0 14px 30px rgba(15,23,42,.14);
      backdrop-filter: blur(18px);
      border-radius: 24px;
      padding: 8px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      z-index: 20;
    }

    .nav-btn {
      min-height: 58px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      gap: 3px;
      color: var(--muted);
      font-weight: 800;
      cursor: pointer;
      transition: background .16s ease, color .16s ease, transform .16s ease;
    }

    .nav-btn svg { width: 20px; height: 20px; }
    .nav-btn.active {
      background: linear-gradient(180deg, rgba(10,110,209,.12), rgba(10,110,209,.08));
      color: var(--blue);
    }

    .nav-label { font-size: 12px; }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(15,23,42,.46);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 40;
      backdrop-filter: blur(8px);
    }

    .overlay.hidden { display: none; }

    .login-card {
      width: 100%;
      max-width: 420px;
      padding: 24px;
      border-radius: 28px;
    }

    .login-title { margin: 0; font-size: 24px; font-weight: 700; letter-spacing: 0.01em; text-transform: none; }

    .status-toast {
      position: fixed;
      left: 50%;
      top: calc(var(--safe-top) + 14px);
      transform: translateX(-50%) translateY(-20px);
      opacity: 0;
      min-width: 280px;
      max-width: 90%;
      background: rgba(15,23,42,.95);
      color: #fff;
      border-radius: 18px;
      padding: 14px 16px;
      z-index: 60;
      box-shadow: 0 14px 30px rgba(15,23,42,.24);
      transition: .22s ease;
      pointer-events: none;
      text-align: center;
      font-weight: 700;
    }

    .status-toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .foot-space { height: 12px; }

    @media (max-width: 360px) {
      .grid-kpis { grid-template-columns: 1fr; }
      .action-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="header">
      <div class="brand-row">
        <div class="brand-left">
          <div class="brand-badge">SAP</div>
          <div class="brand-meta">
            <h1 class="brand-name" id="brandName">Resumen</h1>
          </div>
        </div>
        <div class="sync-pill">
          <span class="dot" id="syncDot"></span>
          <span id="syncLabel">Bloqueado</span>
        </div>
      </div>
    </header>

    <main>
      <section class="screen active" id="screen-dashboard">
        <div class="hero-card">
          <h2 class="hero-title">Resumen</h2>
          <div class="action-row" style="grid-template-columns: 1fr;">
            <button class="btn btn-primary" id="btnRefreshDashboard">Sincronizar</button>
          </div>
        </div>

        <div class="grid-kpis">
          <article class="kpi-card">
            <div class="kpi-head">
              <p class="kpi-label">Clientes registrados</p>
              <span class="kpi-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2"></path><circle cx="9.5" cy="7" r="4"></circle><path d="M20 8v6"></path><path d="M23 11h-6"></path></svg>
              </span>
            </div>
            <p class="kpi-value" id="kpiClientes">0</p>
          </article>
          <article class="kpi-card">
            <div class="kpi-head">
              <p class="kpi-label">Puntos acumulados</p>
              <span class="kpi-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18"></path><path d="M17 7.5c0-1.9-1.8-3.5-5-3.5S7 5.2 7 7c0 5 10 2 10 8 0 2-2 4-5 4s-5-1.6-5-3.5"></path></svg>
              </span>
            </div>
            <p class="kpi-value" id="kpiPuntos">0</p>
          </article>
          <article class="kpi-card">
            <div class="kpi-head">
              <p class="kpi-label">Clientes con premio</p>
              <span class="kpi-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M20 12v7a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1v-7"></path><path d="M2 7h20v5H2z"></path><path d="M12 7v13"></path><path d="M12 7H9.2a2.2 2.2 0 1 1 0-4.4C11.4 2.6 12 7 12 7z"></path><path d="M12 7h2.8a2.2 2.2 0 1 0 0-4.4C12.6 2.6 12 7 12 7z"></path></svg>
              </span>
            </div>
            <p class="kpi-value" id="kpiPremios">0</p>
          </article>
          <article class="kpi-card">
            <div class="kpi-head">
              <p class="kpi-label">Puntos marcados hoy</p>
              <span class="kpi-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="4"></rect><path d="M8 2v4"></path><path d="M16 2v4"></path><path d="M3 10h18"></path><path d="m9 15 2 2 4-4"></path></svg>
              </span>
            </div>
            <p class="kpi-value" id="kpiHoy">0</p>
          </article>
        </div>

        <div class="panel">
          <div class="panel-head">
            <div>
              <h3 class="panel-title">Movimientos</h3>
            </div>
          </div>
          <div class="movement-list" id="movementList">
            <div class="empty-state">Sin datos</div>
          </div>
        </div>

        <div class="panel">
          <div class="panel-head">
            <div>
              <h3 class="panel-title">Acceso</h3>
            </div>
          </div>
          <div class="action-row" style="margin-top: 0; grid-template-columns: 1fr;">
            <button class="btn btn-secondary" id="btnLock">Bloquear</button>
          </div>
        </div>
        <div class="foot-space"></div>
      </section>

      <section class="screen" id="screen-config">
        <div class="hero-card">
          <h2 class="hero-title">Ajustes</h2>
        </div>

        <div class="panel">
          <div class="panel-head">
            <div>
              <h3 class="panel-title">General</h3>
            </div>
          </div>
          <div class="form-grid">
            <div class="field">
              <label for="cfgNombre">Nombre</label>
              <div class="input-wrap">
                <input id="cfgNombre" type="text" placeholder="Nombre" />
              </div>
            </div>
            <div class="field">
              <label for="cfgMeta">Meta</label>
              <div class="input-wrap">
                <input id="cfgMeta" type="number" inputmode="numeric" min="1" placeholder="10" />
              </div>
            </div>
            <div class="field">
              <label for="cfgRecompensa">Premio</label>
              <div class="input-wrap">
                <input id="cfgRecompensa" type="text" placeholder="Ej. Premio" />
              </div>
            </div>
            <div class="field">
              <label for="cfgBloqueo">Bloqueo (min)</label>
              <div class="input-wrap">
                <input id="cfgBloqueo" type="number" inputmode="numeric" min="0" placeholder="5" />
              </div>
            </div>
          </div>
          <div style="height: 14px"></div>
          <div class="action-row" style="margin-top: 0;">
            <button class="btn btn-primary" id="btnSaveConfig">Guardar</button>
            
          </div>
        </div>
        <div class="foot-space"></div>
      </section>
    </main>

    <nav class="bottom-nav">
      <button class="nav-btn active" data-target="dashboard">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 13.5 12 4l9 9.5"></path><path d="M5 11.8V20h14v-8.2"></path></svg>
        <span class="nav-label">Resumen</span>
      </button>
      <button class="nav-btn" data-target="config">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 8.5A3.5 3.5 0 1 0 12 15.5A3.5 3.5 0 1 0 12 8.5z"></path><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.7 1.7 0 0 0 15 19.4a1.7 1.7 0 0 0-1 .45 1.7 1.7 0 0 0-.5 1.2V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-.5-1.2A1.7 1.7 0 0 0 8 19.4a1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.7 1.7 0 0 0 4.6 15a1.7 1.7 0 0 0-.45-1 1.7 1.7 0 0 0-1.2-.5H3a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 1.2-.5A1.7 1.7 0 0 0 4.6 8a1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.7 1.7 0 0 0 9 4.6a1.7 1.7 0 0 0 1-.45 1.7 1.7 0 0 0 .5-1.2V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 .5 1.2A1.7 1.7 0 0 0 16 4.6a1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.7 1.7 0 0 0 19.4 9a1.7 1.7 0 0 0 .45 1 1.7 1.7 0 0 0 1.2.5H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.2.5 1.7 1.7 0 0 0-.31 0z"></path></svg>
        <span class="nav-label">Ajustes</span>
      </button>
    </nav>
  </div>

  <div class="overlay" id="pinOverlay">
    <div class="login-card">
      <h2 class="login-title">control tarjeta de lealtad</h2>
      <p style="margin:8px 0 0;color:var(--muted);font-size:14px;line-height:1.45;">Acceso administrativo seguro</p>
      <div class="field" style="margin-top: 16px;">
        <label for="pinInput">Ingresa PIN</label>
        <div class="input-wrap">
          <input id="pinInput" type="password" inputmode="numeric" autocomplete="one-time-code" placeholder="••••" />
        </div>
      </div>
      <div style="height: 14px"></div>
      <button class="btn btn-primary" id="btnValidatePin">Ingresar</button>
    </div>
  </div>

  <div class="status-toast" id="toast"></div>

  <script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbwJjVizJZJ8tDyA7ESkdfIhaagZ1pEMTnvJpPny6HuhLDRoKwTJu06-L2ZpJVMVO4lR/exec';

    const state = {
      pin: '',
      authenticated: false,
      dashboard: null,
      currentScreen: 'dashboard',
      loading: false
    };

    const $ = (id) => document.getElementById(id);

    const els = {
      pinOverlay: $('pinOverlay'),
      pinInput: $('pinInput'),
      btnValidatePin: $('btnValidatePin'),
      syncDot: $('syncDot'),
      syncLabel: $('syncLabel'),
      brandName: $('brandName'),
      kpiClientes: $('kpiClientes'),
      kpiPuntos: $('kpiPuntos'),
      kpiPremios: $('kpiPremios'),
      kpiHoy: $('kpiHoy'),
      movementList: $('movementList'),
      btnRefreshDashboard: $('btnRefreshDashboard'),
      btnRefreshConfig: $('btnRefreshConfig'),
      btnSaveConfig: $('btnSaveConfig'),
      btnLock: $('btnLock'),
      cfgNombre: $('cfgNombre'),
      cfgMeta: $('cfgMeta'),
      cfgRecompensa: $('cfgRecompensa'),
      cfgBloqueo: $('cfgBloqueo'),
      toast: $('toast')
    };

    function showToast(message, ms = 2600) {
      els.toast.textContent = message;
      els.toast.classList.add('show');
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => els.toast.classList.remove('show'), ms);
    }

    function setOnlineState(mode, label) {
      els.syncDot.classList.remove('online', 'offline');
      if (mode === 'online') els.syncDot.classList.add('online');
      if (mode === 'offline') els.syncDot.classList.add('offline');
      els.syncLabel.textContent = label;
    }

    async function getJSON(url) {
      const res = await fetch(url, { method: 'GET', cache: 'no-store' });
      if (!res.ok) throw new Error('No se pudo conectar con la hoja');
      return res.json();
    }

    async function postJSON(payload) {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain;charset=utf-8' },
        body: JSON.stringify(payload)
      });
      if (!res.ok) throw new Error('No se pudo guardar en la hoja');
      return res.json();
    }

    function formatDateTime(value) {
      if (!value) return 'Sin fecha';
      const d = new Date(value);
      if (Number.isNaN(d.getTime())) return String(value);
      return new Intl.DateTimeFormat('es-GT', {
        day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit'
      }).format(d);
    }

    function renderMovements(items = []) {
      if (!items.length) {
        els.movementList.innerHTML = '<div class="empty-state">Sin datos</div>';
        return;
      }

      els.movementList.innerHTML = items.map(item => {
        const tipo = String(item.tipo || '').toUpperCase();
        const cls = tipo === 'CANJE' ? 'tag-canje' : 'tag-suma';
        const puntos = Number(item.puntos || 0);
        const puntosTxt = puntos > 0 ? `+${puntos}` : `${puntos}`;
        return `
          <article class="movement-item">
            <div class="movement-top">
              <div>
                <p class="movement-name">${escapeHtml(item.nombre || 'Sin nombre')}</p>
                <p class="movement-id">${escapeHtml(item.id_cliente || '-')}</p>
              </div>
              <span class="movement-type ${cls}">${escapeHtml(tipo || 'MOV')}</span>
            </div>
            <div class="movement-meta">
              <span>${formatDateTime(item.fecha)}</span>
              <span>Puntos: ${escapeHtml(String(puntosTxt))}</span>
              <span>Usuario: ${escapeHtml(item.usuario || '-')}</span>
            </div>
            <div class="movement-meta">
              <span>${escapeHtml(item.nota || 'Sin nota')}</span>
            </div>
          </article>
        `;
      }).join('');
    }

    function renderDashboard(payload) {
      const dashboard = payload?.dashboard || {};
      const config = payload?.config || {};

      state.dashboard = payload;
      els.kpiClientes.textContent = dashboard.clientes_registrados ?? 0;
      els.kpiPuntos.textContent = dashboard.puntos_acumulados ?? 0;
      els.kpiPremios.textContent = dashboard.clientes_con_premio ?? 0;
      els.kpiHoy.textContent = dashboard.puntos_marcados_hoy ?? 0;
      els.brandName.textContent = config.nombre_negocio || 'Resumen';
      renderMovements(dashboard.ultimos_movimientos || []);

      els.cfgNombre.value = config.nombre_negocio || '';
      els.cfgMeta.value = config.meta_puntos ?? '';
      els.cfgRecompensa.value = config.recompensa || '';
    }

    async function loadDashboard() {
      try {
        setOnlineState('', 'Sync');
        const data = await getJSON(`${API_URL}?action=getDashboard&_=${Date.now()}`);
        if (!data.ok) throw new Error(data.message || 'No se pudo cargar');
        renderDashboard(data);
        setOnlineState('online', 'OK');
      } catch (err) {
        setOnlineState('offline', 'Error');
        showToast(err.message || 'Error al cargar');
      }
    }

    async function loadConfigDetails() {
      await loadDashboard();
      const bloqueo = await readConfigBlockingTime();
      els.cfgBloqueo.value = bloqueo ?? '';
    }

    async function readConfigBlockingTime() {
      try {
        const data = await getJSON(`${API_URL}?action=getDashboard&_=${Date.now()}`);
        if (data?.config && typeof data.config.tiempo_bloqueo_min !== 'undefined') {
          return data.config.tiempo_bloqueo_min;
        }
      } catch (_) {}
      return '';
    }

    async function validatePin() {
      const pin = els.pinInput.value.trim();
      if (!pin) {
        showToast('Ingresa el PIN');
        els.pinInput.focus();
        return;
      }

      els.btnValidatePin.disabled = true;
      els.btnValidatePin.textContent = 'Validando...';

      try {
        const data = await getJSON(`${API_URL}?action=validatePin&pin=${encodeURIComponent(pin)}&_=${Date.now()}`);
        if (!data.ok) throw new Error(data.message || 'PIN incorrecto');
        state.pin = pin;
        state.authenticated = true;
        els.pinOverlay.classList.add('hidden');
        setOnlineState('online', 'Activo');
        showToast('Acceso autorizado');
        await loadConfigDetails();
      } catch (err) {
        setOnlineState('offline', 'Error');
        showToast(err.message || 'No se pudo validar');
      } finally {
        els.btnValidatePin.disabled = false;
        els.btnValidatePin.textContent = 'Ingresar';
      }
    }

    function setScreen(screen) {
      state.currentScreen = screen;
      document.querySelectorAll('.screen').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
      document.getElementById(`screen-${screen}`).classList.add('active');
      document.querySelector(`.nav-btn[data-target="${screen}"]`).classList.add('active');
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    async function saveConfig() {
      const payload = {
        action: 'updateConfig',
        pin: state.pin,
        nombre_negocio: els.cfgNombre.value.trim(),
        meta_puntos: Number(els.cfgMeta.value || 0),
        recompensa: els.cfgRecompensa.value.trim(),
        tiempo_bloqueo_min: Number(els.cfgBloqueo.value || 0)
      };

      if (!payload.nombre_negocio || !payload.meta_puntos || !payload.recompensa) {
        showToast('Completa nombre, meta y premio');
        return;
      }

      try {
        els.btnSaveConfig.disabled = true;
        els.btnSaveConfig.textContent = 'Guardando...';
        const data = await postJSON(payload);
        if (!data.ok) throw new Error(data.message || 'No se pudo guardar');
        showToast('Configuración guardada');
        await loadConfigDetails();
      } catch (err) {
        showToast('Falta la acción updateConfig en Apps Script');
      } finally {
        els.btnSaveConfig.disabled = false;
        els.btnSaveConfig.textContent = 'Guardar';
      }
    }

    function lockSession() {
      state.pin = '';
      state.authenticated = false;
      els.pinInput.value = '';
      els.pinOverlay.classList.remove('hidden');
      setOnlineState('', 'Bloqueado');
      showToast('Sesión bloqueada');
      setTimeout(() => els.pinInput.focus(), 120);
    }

    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', async () => {
        const target = btn.dataset.target;
        setScreen(target);
        if (target === 'config') await loadConfigDetails();
      });
    });

    els.btnValidatePin.addEventListener('click', validatePin);
    els.pinInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') validatePin(); });
    els.btnRefreshDashboard.addEventListener('click', loadDashboard);
    
    els.btnSaveConfig.addEventListener('click', saveConfig);
    els.btnLock.addEventListener('click', lockSession);

    setTimeout(() => els.pinInput.focus(), 250);
  </script>
</body>
</html>
